name: Build and Release Country MMDB

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 3" # every wednesday 3am utc
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build country.mmdb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expand swap space (for large data processing)
        run: |
          sudo swapoff /swapfile || true
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install dependencies
        run: make deps

      - name: Download data sources
        run: make download

      - name: Merge data
        run: make merge

      - name: Build MMDB
        run: make build

      - name: Verify MMDB
        run: |
          file country.mmdb
          ls -lh country.mmdb

      - name: Get build metadata
        id: metadata
        run: |
          SIZE_BYTES=$(stat -c%s country.mmdb)
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          BUILD_DATE=$(date -u +'%Y-%m-%d')
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Build Date: $BUILD_DATE"
          echo "Build Time: $BUILD_TIME"
          echo "Database Size: $SIZE_MB MB"

      - name: Delete old releases
        run: |
          RELEASES=$(gh release list --repo "${{ github.repository }}" --limit 100 --json name,createdAt -q '.[3:][].name')
          for release in $RELEASES; do
            echo "Deleting old release: $release"
            gh release delete "$release" --repo "${{ github.repository }}" --yes || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.build_date }}
          name: Country MMDB - ${{ steps.metadata.outputs.build_date }}
          body: |
            # GeoIP Country MMDB Database
            
            Lightweight MaxMind MMDB database optimized for quick GeoIP lookups.
            
            **Build Information:**
            - Generated: ${{ steps.metadata.outputs.build_time }}
            - Size: ${{ steps.metadata.outputs.size_mb }} MB
            - Format: MaxMind MMDB version 2.0
            - Database Type: GeoIP2-Country-ASN
            
            **Contents:**
            - Country ISO codes (2-letter)
            - Autonomous System Numbers (ASN)
            - Organization Names
            
            **Features:**
            - 73% smaller than full city database
            - Optimized for production use
            - High-coverage ASN/ORG data (95%+ for IPv4)
            - Combined IPv4 + IPv6 support
            
            **Usage:**
            ```python
            import maxminddb
            with maxminddb.open_database('country.mmdb') as reader:
                data = reader.get('99.100.2.22')
                print(data)
                # Output: {
                #     'country': {'iso_code': 'US'},
                #     'autonomous_system_number': 7018,
                #     'autonomous_system_organization': 'ATT-INTERNET4'
                # }
            ```
          files: country.mmdb
          draft: false
          prerelease: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: country-mmdb
          path: country.mmdb
          retention-days: 30
          if-no-files-found: error
